<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>World</title>
        <link rel="stylesheet" href="World.css" />
    </head>

    <body onload="main()">
        <div id = "main">
            <div id = "canvasAndImageContainer">
                <canvas id="webgl">
                Please use a browser that supports "canvas"
                </canvas>
                <img id="centerCursor" src="textures/cursor.png" alt="Center Cursor" />
            </div>
        </div>

        <div id="stats">
            <p id="controlHint">ESC: Unlock Cursor | WASD: Move | QE: Turn | Space: Fly | Shift: Descend</p>
        </div>
        <div id = "controlsContainer">
            <div id = "buttonContainer">  
                <button id="normal">Normal</button>
                <button id="orbit" class="selected">Orbit</button>
                <button id="light" class="selected">Light</button>
                <button id="spot">Spot</button>
                <button id="nightMode">Night Mode</button>
                <button id="redSun">Red Sun</button>
            </div>

            <div id="sliderContainer">
                <p>
                    Light X <input type="range" min = "-250" max="250" value="0" class="slider" id = "lightSliderX">
                    Light Y <input type="range" min = "-250" max="250" value="0" class="slider" id = "lightSliderY">
                    Light Z <input type="range" min = "-250" max="250" value="0" class="slider" id = "lightSliderZ">
                </p>
                <p>
                    Sun R <input type="range" min="0" max="100" value="100" class="slider" id="sunColorSliderR">
                    Sun G <input type="range" min="0" max="100" value="100" class="slider" id="sunColorSliderG">
                    Sun B <input type="range" min="0" max="100" value="100" class="slider" id="sunColorSliderB">
                </p>
            </div>
        </div>

        <script src="../lib/webgl-utils.js"></script>
        <script src="../lib/webgl-debug.js"></script>
        <script src="../lib/cuon-utils.js"></script>
        <script src="../lib/cuon.matrix.js"></script>
        <script src="Camera.js"></script>
        <script src="Point.js"></script>
        <script src="Triangle.js"></script>
        <script src="Circle.js"></script>
        <script src="Cube.js"></script>
        <script src="Cylinder.js"></script>
        <script src="Sphere.js"></script>
        <script src="Model.js"></script>
        <script src="World.js"></script>
    </body>
</html>
